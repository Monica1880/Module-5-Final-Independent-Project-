<!doctype html>
<html>
  <head>
    <title>Module 5 Final Project _ FES Movies API</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>

  <body>
    <header>
      <h1>Monica's Movie <br />Search Fun!</h1>
    </header>

    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>

    <section class="landing__img">
      <form class="search-form" id="searchForm">
        <input
          class="search-form__input"
          type="text"
          id="searchInput"
          placeholder="Search movies..."
          required
        />
        <button class="search-form__button" type="submit">Search</button>
      </form>

      <select id="sort">
        <option value="default">Sort</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>

      <main>
        <h2>Welcome👋</h2>
        <p>
          We are so glad you're here! Please feel free to use the search bar
          above - to search our database for your favorite movie titles.
        </p>

        <!-- FIX: Uncommented this div so movies have somewhere to appear! -->
        <div id="movieGrid" class="movies-grid"></div>

      </main>
    </section>

    <footer>
      <p>© 2026 Monica's Movie Search Fun</p>
    </footer>
  </body>
</html>
